# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              <Sewon> <Park>
  email:             <swpark0413@gmail.com>

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    Hello Everyone, 

    My name is Sewon Park and I am a Data Science Enthusiast.

    Thank you so much for taking your precious time to read this blog. Feel free to point out any mistake (I’m a learner after all) and provide respective feedback or leave a comment.

  # This photo will be used in the about section
  picture:
    path:            # https://swpark0413.github.io/assets/img/swpark.png
    # srcset is optional, but can be used to provide higher res versions for retina displays
    srcset:
      1x:            # https://swpark0413.github.io/assets/img/swpark.png
      2x:            # https://swpark0413.github.io/assets/img/swpark.png

